# ==============================================================================
# БИБЛИОТЕКА ТИПОВ НЕЙРОНОВ (Genesis Blueprint)
# Аппаратный лимит: 16 типов. Каждый пакуется в 64 байта (1 L1 Cache Line).
# ==============================================================================

[[neuron_type]]
name = "Template_Excitatory"
is_inhibitory = false                  # Закон Дейла: вес синапсов будет положительным

# ==============================================================================
# [Day Phase] Мембрана и Динамика (Integer Physics)
# ==============================================================================
threshold = 30000                      # Порог генерации спайка (mV)
rest_potential = 10000                 # Потенциал покоя после разряда
leak_rate = 1500                       # Утечка заряда за 1 тик (двусторонняя)
spontaneous_firing_period_ticks = 400  # Спонтанный спайк (DDS) каждые 400 тиков (0 = откл)

refractory_period = 15                 # Глухая рефрактерность сомы (тики)
synapse_refractory_period = 15         # Кулдаун дендритного слота (тики)
signal_propagation_length = 20         # Длина Active Tail (в сегментах)

homeostasis_penalty = 10000            # Наказание (+mV к порогу) за каждый спайк
homeostasis_decay = 20                 # Остывание порога за тик (возврат к норме)

# ==============================================================================
# [Day Phase] Пластичность GSOP (Branchless STDP)
# ==============================================================================
initial_synapse_weight = 74            # Базовый стартовый вес
gsop_potentiation = 150                # Дельта усиления при причинности
gsop_depression = 60                   # Дельта ослабления при промахе
prune_threshold = 15                   # [Night Phase] Удаление связи, если abs(weight) < 15

# Фиксированная точка: 128 = 1.0x множитель пластичности
slot_decay_ltm = 96                    # Стабильность: Слоты 0..79 (сопротивление шуму)
slot_decay_wm = 190                    # Пластичность: Слоты 80..127 (быстрое обучение)

# Нелинейное сопротивление изменению (15 рангов по 2048 единиц веса). 128 = 1.0x
inertia_curve = [1-15]

# ==============================================================================
# [Night Phase] Рост и Морфология (CPU-side, f32 разрешен)
# ==============================================================================
steering_fov_deg = 60.0                # Угол обзора конуса роста аксона
steering_radius_um = 100.0             # Дальность поиска дендритов (Cone Tracing)
growth_vertical_bias = 0.8             # Сила тяги к целевому Z-слою
dendrite_radius_um = 200.0             # Радиус захвата синапсов
type_affinity = 0.8                    # 1.0 = растет к своему типу, 0.0 = к чужим

steering_weight_inertia = 0.6          # Сохранение прямолинейного импульса
steering_weight_sensor = 0.3           # Притяжение к кластерам нейронов
steering_weight_jitter = 0.1           # Детерминированный шум

sprouting_weight_distance = 0.5        # Эвристика захвата дендритов (сумма ≈ 1.0)
sprouting_weight_power = 0.4
sprouting_weight_explore = 0.1
sprouting_weight_type = 0.0