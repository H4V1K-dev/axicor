# ==============================================================================
# Идентификатор и привязка к родительской зоне
# ==============================================================================
zone_id = "TemplateZone"

# ==============================================================================
# Пространственная геометрия шарда (Абсолютные воксели)
# world_offset определяет, где в глобальном 3D-мозге начинается этот шард.
# dimensions определяет его физический объем.
# ==============================================================================
[world_offset]
x = 0
y = 0
z = 0

[dimensions]
w = 40
d = 40
h = 100

# ==============================================================================
# Топология соседства (Network Routing)
# IP-адреса узлов, которые физически считают соседние регионы пространства.
# "Self" = loopback (тороидальное замыкание). Отсутствие ключа = граница мира.
# ==============================================================================
[neighbors]
# x_plus = "192.168.1.10:19001"
# x_minus = "Self"

# ==============================================================================
# Динамические настройки шарда (Runtime Lifecycle)
# Строго обязательный блок. Движок паникует при отсутствии.
# ==============================================================================
[settings]
# Как часто (в тиках) шард замораживается для фазы Sprouting & Pruning.
# 100_000 тиков = каждые 10 секунд реального времени (при 100мкс тике).
# 0 = Отключить ночную фазу (для статических/Relay зон).
night_interval_ticks = 100_000

# Как часто VRAM скидывает горячие веса в checkpoint.state на SSD.
# Защита от сбоев питания (Crash Tolerance).
save_checkpoints_interval_ticks = 250_000