# ==============================================================================
# Глобальные настройки I/O шарда
# ==============================================================================
# Размер пачки для отправки наружу (по умолчанию равен sync_batch_ticks).
# readout_batch_ticks = 100

# ==============================================================================
# Входящие матрицы (Сенсоры или входы от Ghost Axons)
# Спавнит (width * height) виртуальных аксонов.
# ==============================================================================
[[input]]
name = "template_in"
zone = "TemplateZone"
width = 8
height = 8
# Глубина спавна аксонов: "top" (Z_max), "mid" (Z_mid), "bottom" (Z_min) или число в мкм
entry_z = "top"
# К каким типам нейронов аксонам разрешено подключаться ("All" или точное имя, напр. "L4_spiny_MTG_1")
target_type = "All"
# stride = 1 критичен для GNM: долбит спайками каждый тик, чтобы пробить высокий threshold.
# stride = 0 выдаст ровно 1 спайк на весь батч.
stride = 1

# ==============================================================================
# Исходящие матрицы (Моторы или выходы для Ghost Axons)
# Биндит (width * height) сом к выходному буферу.
# ==============================================================================
[[output]]
name = "template_out"
zone = "TemplateZone"
width = 8
height = 8
# Откуда снимать сигнал. При коллизиях в столбце Baker использует Z-Sort:
# "bottom" выберет нейрон с минимальным Z в рамках пикселя.
entry_z = "bottom"
target_type = "All"
stride = 1