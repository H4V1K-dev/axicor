# ==============================================================================
# Глобальные параметры Вселенной (Genesis Physics)
# ==============================================================================

[world]
# Физические размеры мирового пространства (в микрометрах). 
# Зоны и Шарды "вырезают" себе куски из этого объема.
width_um = 1000
depth_um = 1000
height_um = 2500

[simulation]
# Временное разрешение (1 тик = 100 мкс)
tick_duration_us = 100

# Синхронизация кластера. BSP Барьер срабатывает каждые 20 тиков (2 мс).
# Чем меньше батч, тем быстрее реакция (HFT), но выше сетевой оверхед.
sync_batch_ticks = 20

# 0 = Бесконечный цикл SNN. Если указать число, движок сам завершит процесс.
total_ticks = 0

# Детерминированный Seed. Гарантирует, что при одном конфиге сеть всегда растет одинаково.
master_seed = "GENESIS"

# ==============================================================================
# Дискретизация Пространства (Integer Geometry)
# ==============================================================================
# Размер вокселя в микрометрах
voxel_size_um = 25.0

# Длина сегмента аксона в вокселях
segment_length_voxels = 2

# Скорость сигнала. Строгий математический инвариант:
# (signal_speed_m_s * 100) / (voxel_size_um * segment_length_voxels) ОБЯЗАНО быть целым!
# При 2.5 м/s: 250 мкм/тик / 50 мкм = v_seg 5 (5 сегментов за 1 тик).
signal_speed_m_s = 2.5

# Максимальная дистанция роста аксонов.
# АППАРАТНЫЙ ЛИМИТ: Не больше 255 (ограничение 8-битного смещения в PackedTarget).
# При должном расчете шардов и прочего можно обходить этот лимит и растить 
# аксоны длинной в километры.
axon_growth_max_steps = 200